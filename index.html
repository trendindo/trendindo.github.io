<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIRAL BANGET!</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;
}

.container{
    padding:30px 20px;
}

h1{
    font-size:38px;
    color:#ff2e2e;
    animation: kedip 1s infinite;
}

@keyframes kedip{
    0%{opacity:1;}
    50%{opacity:0.5;}
    100%{opacity:1;}
}

.blur-img{
    width:90%;
    max-width:350px;
    border-radius:15px;
    filter:blur(8px);
    margin-top:20px;
    box-shadow:0 0 20px rgba(255,0,0,0.5);
}

.desc{
    margin-top:20px;
    font-size:18px;
    line-height:1.6;
}

.timer{
    font-size:30px;
    margin-top:20px;
    color:yellow;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:18px 40px;
    background:red;
    color:white;
    text-decoration:none;
    border-radius:50px;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 0 20px rgba(255,0,0,0.6);
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    background:#ff3b3b;
}

.small{
    margin-top:15px;
    color:#999;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚠️ VIRAL BANGET ⚠️</h1>

<img class="blur-img" src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d" alt="viral">

<div class="desc">
Video ini lagi bikin heboh netizen 😱<br>
Banyak orang langsung kaget setelah melihatnya...
</div>

<div class="timer" id="countdown">
00:15
</div>

<a class="btn" href="https://s.shopee.co.id/9zuNvAx5Ee" target="_blank">
LIHAT SEKARANG
</a>

<div class="small">
Klik tombol sebelum halaman ditutup...
</div>

</div>

<script>
let waktu = 15;

setInterval(() => {
    waktu--;

    let detik = waktu < 10 ? "0" + waktu : waktu;

    document.getElementById("countdown").innerHTML = "00:" + detik;

    if(waktu <= 0){
        window.location.href = "https://s.shopee.co.id/9zuNvAx5Ee";
    }
},1000);
</script>

</body>
</html>
