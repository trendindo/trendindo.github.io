<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promo Menarik</title>

  <!-- Redirect otomatis setelah 1 detik -->
  <meta http-equiv="refresh" content="1; url=https://s.shopee.co.id/809RqlZMTN">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .splash {
      width: 100%;
      height: 100vh;
      position: relative;
    }

    .splash img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      filter: brightness(0.6);
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      text-align: center;
      background: rgba(0,0,0,0.3);
    }

    .overlay h1 {
      font-size: 45px;
      margin-bottom: 15px;
      animation: zoom 1s ease;
      text-shadow: 0 0 15px rgba(255,255,255,0.7);
    }

    .overlay p {
      font-size: 18px;
      color: #f1f1f1;
    }

    @keyframes zoom {
      from {
        transform: scale(0.7);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <div class="splash">
    <!-- Ganti link gambar di bawah -->
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200&auto=format&fit=crop" alt="Promo Menarik">

    <div class="overlay">
      <h1>🔥 PROMO MENARIK 🔥</h1>
      <p>Sedang mengarahkan ke produk...</p>
    </div>
  </div>

</body>
</html>
