<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEBOH DI INTERNET</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
text-align:center;
overflow:hidden;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200') center/cover;
filter:blur(10px);
transform:scale(1.1);
z-index:-1;
}

.container{
padding:40px 20px;
}

.live{
display:inline-block;
background:red;
padding:8px 18px;
border-radius:30px;
font-size:14px;
font-weight:bold;
animation:blink 1s infinite;
margin-bottom:20px;
}

@keyframes blink{
50%{opacity:0.5;}
}

h1{
font-size:40px;
margin-bottom:20px;
color:#ff3b3b;
}

.box{
background:rgba(0,0,0,0.6);
padding:25px;
border-radius:20px;
max-width:400px;
margin:auto;
backdrop-filter:blur(5px);
}

.text{
font-size:18px;
line-height:1.7;
margin-top:15px;
}

.viewer{
margin-top:20px;
font-size:15px;
color:#00ff95;
}

.btn{
display:inline-block;
margin-top:30px;
padding:18px 35px;
background:#ff2222;
border-radius:50px;
color:white;
text-decoration:none;
font-size:22px;
font-weight:bold;
transition:0.3s;
box-shadow:0 0 25px rgba(255,0,0,0.5);
}

.btn:hover{
transform:scale(1.05);
}

.loading{
width:100%;
height:10px;
background:#333;
border-radius:20px;
margin-top:25px;
overflow:hidden;
}

.loading-bar{
height:100%;
width:0%;
background:red;
animation:load 8s linear forwards;
}

@keyframes load{
100%{width:100%;}
}

.small{
margin-top:15px;
font-size:12px;
color:#aaa;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="live">🔴 LIVE VIRAL</div>

<h1>VIDEO INI BIKIN NETIZEN KAGET 😱</h1>

<div class="box">

<div class="text">
Banyak orang langsung membagikan video ini setelah melihat isi sebenarnya...
</div>

<div class="viewer" id="viewer">
2.341 orang sedang melihat sekarang
</div>

<div class="loading">
<div class="loading-bar"></div>
</div>

<a class="btn" href="https://s.shopee.co.id/5flPBl8VER" target="_blank">
LIHAT SEKARANG
</a>

<div class="small">
Halaman akan dialihkan otomatis...
</div>

</div>

</div>

<script>
let jumlah = 2341;

setInterval(()=>{
jumlah += Math.floor(Math.random()*8);

document.getElementById("viewer").innerHTML =
jumlah.toLocaleString('id-ID') + " orang sedang melihat sekarang";
},2000);

setTimeout(()=>{
window.location.href="https://s.shopee.co.id/5flPBl8VER";
},8000);
</script>

</body>
</html>
